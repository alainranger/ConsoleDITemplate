name: Publish NuGet Package

on:
  workflow_dispatch: # Permet le déclenchement manuel pour tester
  push:
    # Le pipeline se déclenche uniquement lorsqu'un tag de version est poussé (ex: v1.0.0)
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write  # Crucial pour pouvoir écrire/publier sur GitHub Packages

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupération du code source
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Configuration de l'environnement .NET
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    # 3. Restauration des packages NuGet
    - name: Restore Dependencies
      run: dotnet restore

    # 4. Compilation du projet en mode Release
    - name: Build Project
      run: dotnet build --configuration Release --no-restore

    # 5. Exécution des tests unitaires
    - name: Run Tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    # 6. Extraction de la version à partir du Tag Git (ex: v1.2.3 -> 1.2.3)
    - name: Extract Version from Tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    # 7. Création du package NuGet (.nupkg)
    - name: Pack NuGet Package
      run: |
        dotnet pack ./Company.ConsoleTemplate/Company.ConsoleTemplate.csproj \
          --configuration Release \
          --no-build \
          --output ./dist \
          -p:PackageVersion=${{ env.VERSION }}

    # 8. CIBLE 1 : Publication sur GitHub Packages (ACTIF)
    - name: Push to GitHub Packages
      run: |
        dotnet nuget push ./dist/*.nupkg \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --skip-duplicate

    # 9. CIBLE 2 : Publication sur NuGet.org (INACTIF - À activer plus tard)
    # Pour l'activer plus tard :
    #   1. Décommentez les lignes ci-dessous (enlevez les #)
    #   2. Ajoutez le secret 'NUGET_API_KEY' dans les paramètres de votre dépôt GitHub
    #
    # - name: Push to NuGet.org
    #   run: |
      #   dotnet nuget push ./dist/*.nupkg \
      #     --api-key ${{ secrets.NUGET_API_KEY }} \
      #     --source https://api.nuget.org/v3/index.json \
      #     --skip-duplicate
